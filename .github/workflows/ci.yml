name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "file:./prisma/dev.db"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      PRIZEPILOT_FREE_TEST_MODE: "true"
      NEXT_PUBLIC_PRIZEPILOT_FREE_TEST_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
